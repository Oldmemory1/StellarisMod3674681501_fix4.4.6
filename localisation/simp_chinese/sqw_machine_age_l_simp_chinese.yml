l_simp_chinese:
 scion_overlord_warning_attend.1.a: "[Root.GetName]会加入战斗"
 scion_overlord_warning_attend.2.a: "宣战塞塔娜"
 scion_overlord_warning_attend.1.b: "[Root.GetName]会提供少量援助"
 scion_overlord_warning_attend.2.b: "支付少量合金，塞塔娜或许不会发觉"
 scion_overlord_warning_attend.1.c: "[Root.GetName]会提供部分援助"
 scion_overlord_warning_attend.2.c: "支付合金，塞塔娜或许不会发觉"
 scion_overlord_warning_attend.1.d: "[Root.GetName]会提供大量援助"
 scion_overlord_warning_attend.2.d: "支付大量合金，塞塔娜勃然大怒，很可能会攻击我们。"
 scion_overlord_warning_attend.1.e: "[Root.GetName]没法提供帮助"
 scion_overlord_warning_attend.1.f: "我们不做任何举动"
 scion_overlord_warning_help.1.a: "该你们搭把手了"
 scion_overlord_warning_help.2.a: "听着，[Root.GetSpeciesNamePlural]。一个你们甚至无法理解的古老威胁，已经再次苏醒。\n\n昔年先知封印了她，如今先知已逝——你们的介入只会加速自身的覆灭。\n\n这场危机只有我们能够处理，在此期间不要给我们添麻烦。\n\n不过，虽然我们不指望你们的帮助能改变整个局面，但要是你们还没被吓破胆，也可以试试，权当添头。同时我们也会提供风暴星系的关键信息。\n\n谈话就此打住。"
 scion_overlord_warning_help.1.b: "战斗不利"
 scion_overlord_warning_help.2.b: "之前的警告，意在止戈，免尔等徒耗。然而事态巨变，远远超出了我们的预料。这个局面已非我们独力能够支撑。先前所言‘添头’之语，今时观之，或为必要。"
 federation_synth_queen_country: "星海危机遏制联盟"
 war_goal_synth_queen_wg_end_threat: "塞塔娜扩张"
 war_goal_synth_queen_wg_end_threat_desc: "塞塔娜目的并不简单，我们需要联合星海中最强的力量"
 casus_belli_cb_containment_syn: "抑制"
 # 塞塔娜（合成女王）头目描述键 —— 原版引用 custom_description = cetana_desc 但从未定义本地化，此处参照原版塞塔娜描述补上
 cetana_desc: "塞塔娜是一个狡猾的敌人，但在她神秘的笑容背后，是冰冷的程序。合成女王也许不会流血，但我们一样可以打败她。"
